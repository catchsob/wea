name: Trigger auto deployment for weapi

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/weapi-AutoDeployTrigger-32e73cdf-8fd4-45ae-901d-e2c81651f38c.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.WEAPI_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: enoscr.azurecr.io
          registryUsername: ${{ secrets.WEAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WEAPI_REGISTRY_PASSWORD }}
          containerAppName: weapi
          resourceGroup: hh-test
          imageToBuild: enoscr.azurecr.io/weapi:${{ github.sha }}
          

     

